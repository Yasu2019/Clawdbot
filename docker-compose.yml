name: clawstack-unified

services:
  # ============================================================
  # 1. CORE AGENT & ORCHESTRATION
  # ============================================================
  clawdbot-gateway:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:${OPENCLAW_PORT:-18789}:18789"
      - "127.0.0.1:${OPENCLAW_BROWSER_PORT:-18791}:18791"
    env_file: .env
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - HOME=/home/node
      - OPENCLAW_GATEWAY_TOKEN=yasu-fresh-token-2026-02-01
      # Internal service URLs (Docker network — used by agent scripts/API calls)
      - N8N_URL=http://n8n:5678
      - N8N_API_URL=http://n8n:5678/api/v1
      - NODERED_URL=http://nodered:1880
      - PAPERLESS_URL=http://paperless:8000
      - PAPERLESS_API_URL=http://paperless:8000/api
      - PAPERLESS_USER=admin
      - PAPERLESS_PASS=admin
      - OPEN_NOTEBOOK_URL=http://open_notebook:8502
      - OPEN_NOTEBOOK_API_URL=http://open_notebook:5055
      - QUALITY_DASHBOARD_URL=http://quality_dashboard:8090
      - WORKSTUDY_URL=http://workstudy_app:7870
      - MINIGAME_UI_URL=http://minigame_ui:3000
      - MINIGAME_API_URL=http://minigame_api:8000
      - QDRANT_URL=http://qdrant:6333
      - OPENAI_BASE_URL=http://litellm:4000/v1
      - OPENAI_API_KEY=local-dev-key
      - LITELLM_URL=http://litellm:4000
      - INFINITY_URL=http://infinity:7997
      - SEARXNG_URL=http://searxng:8080
      - MINIO_URL=http://minio:9000
      - MINIO_USER=minioadmin
      - MINIO_PASS=${MINIO_ROOT_PASSWORD}
      - POSTGRES_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
      - REDIS_URL=redis://redis:6379/0
      - N8N_MCP_URL=http://n8n:5678/mcp-server/http
      - N8N_MCP_KEY=${N8N_MCP_KEY}
      # Browser-facing URLs (host.docker.internal — used by openclaw browser)
      - PORTAL_URL=http://host.docker.internal:8088/portal.html
      - BROWSER_N8N_URL=http://host.docker.internal:5679
      - BROWSER_NODERED_URL=http://host.docker.internal:1880
      - BROWSER_PAPERLESS_URL=http://host.docker.internal:8000
      - BROWSER_OPEN_NOTEBOOK_URL=http://host.docker.internal:8502
      - BROWSER_QUALITY_DASHBOARD_URL=http://host.docker.internal:8090
      - BROWSER_WORKSTUDY_URL=http://host.docker.internal:7870
      - BROWSER_MINIGAME_URL=http://host.docker.internal:3100
      - BROWSER_STIRLING_PDF_URL=http://host.docker.internal:8085
      - BROWSER_STABLE_DIFFUSION_URL=http://host.docker.internal:7861
      - BROWSER_IATF_URL=http://host.docker.internal:3000
      - BROWSER_VOICEVOX_URL=http://host.docker.internal:50021
      - CONTEXT_FILE=/home/node/clawd/PORTAL_APPS.md
    volumes:
      - ./data/state:/home/node/.openclaw
      - ./data/workspace:/home/node/clawd
      - ./data/state/claude_config:/home/node/.config/claude-code
      - ./data/state/codex:/home/node/.codex
      - ./consume/WIP:/home/node/clawd/consume/WIP
      - "./data/state/Obsidian Vault:/home/node/clawd/obsidian_vault"
      - "./data/state/IATF_documents:/home/node/clawd/iatf_documents"
      - ./iatf_system:/home/node/clawd/iatf_system_code
      - ./clawstack_v2/data/paperless/consume:/home/node/clawd/paperless_consume
      - ./data/rclone:/home/node/.config/rclone
      - ./data/state/claude.json:/home/node/.claude.json
      - ./data/state/playwright_cache/ms-playwright:/home/node/.cache/ms-playwright
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    user: root
    entrypoint: [ /bin/bash, /home/node/.openclaw/entrypoint.sh ]
    command: [ openclaw, gateway, --port, "18789", --bind, lan, --verbose, --allow-unconfigured ]

  # ============================================================
  # 2. SHARED INFRASTRUCTURE (From clawstack_v2)
  # ============================================================
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./clawstack_v2/data/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7
    volumes:
      - ./clawstack_v2/data/redis:/data
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ./clawstack_v2/data/ollama:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    environment:
      - OLLAMA_NUM_PARALLEL=1       # CPUではキュー直列化が高速（スレッド競合回避）
      - OLLAMA_MAX_LOADED_MODELS=1  # モデルスワップ禁止（ロード待ち時間ゼロ）
      - OLLAMA_FLASH_ATTENTION=1    # Flash Attention有効（推論高速化）
      - OLLAMA_KEEP_ALIVE=30m       # 30分アイドル後アンロード（RAM解放）
    deploy:
      resources:
        limits:
          cpus: "14"    # 20コア中14コア（他サービス用に6コア確保）
          memory: 20g   # qwen3:14b(9.3GB)+KVキャッシュ+余裕
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - ./clawstack_v2/data/qdrant:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - ./clawstack_v2/data/objectstore:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    restart: unless-stopped

  # ============================================================
  # 3. AUTOMATION & TOOLS
  # ============================================================
  n8n:
    build:
      context: ./clawstack_v2/docker/n8n
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:5679:5678"
    environment:
      - N8N_HOST=127.0.0.1
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://127.0.0.1:5679/
      - GENERIC_TIMEZONE=${TZ}
      # Execute Command ノード & Local File Trigger を有効化
      # デフォルトでは ['n8n-nodes-base.executeCommand','n8n-nodes-base.localFileTrigger'] が除外される
      - NODES_EXCLUDE=[]
      # /work ディレクトリへのファイルアクセスを許可
      - N8N_RESTRICT_FILE_ACCESS_TO=/work
      # REST API / MCP アクセス用 API Key (OpenClaw-MCP)
      - N8N_API_KEY=n8n_api_clawstack_f39c126b684f59ab50cc3fdedd82891086bfc633601067c9
      # コミュニティノード有効化 (n8n-nodes-mcp 等)
      - N8N_COMMUNITY_PACKAGES_ENABLED=true
      # JavaScript (Code) ノードから組み込みモジュール操作(fs, path等)を許可
      - NODE_FUNCTION_ALLOW_BUILTIN=fs,path,crypto
      # JavaScript (Code) ノードから外部モジュール操作を許可 (念のため)
      - NODE_FUNCTION_ALLOW_EXTERNAL=crypto-js,lodash
      # OpenClaw が MCP Client として接続するための公開 URL
      - N8N_PUBLIC_API_DISABLED=false
    volumes:
      - ./clawstack_v2/data/n8n:/root/.n8n
      - ./clawstack_v2/data/work:/work
      - ./data/workspace:/workspace
      - ./clawstack_v2/data/paperless/consume/email:/local_emails:ro
      - /var/run/docker.sock:/var/run/docker.sock
    user: root
    restart: unless-stopped

  nodered:
    image: nodered/node-red:latest
    ports:
      - "127.0.0.1:1880:1880"
    environment:
      - TZ=${TZ}
    volumes:
      - ./clawstack_v2/data/nodered:/data
      - ./clawstack_v2/data/work:/work
    restart: unless-stopped

  # ============================================================
  # 4. CONTENT & AI SUITE (TEMPORARILY DISABLED DUE TO REGISTRY ISSUES)
  # ============================================================
  # stirling_pdf:
  #   image: froodleb/s-pdf:latest
  #   ports:
  #     - "127.0.0.1:8085:8080"
  #   environment:
  #     - DOCKER_ENABLE_SECURITY=false
  #   volumes:
  #     - ./clawstack_v2/data/stirling_pdf/trainingData:/usr/src/app/trainingData
  #     - ./clawstack_v2/data/stirling_pdf/extraConfigs:/usr/src/app/configs
  #   networks:
  #     - clawstack_default
  #   restart: unless-stopped

  # stable_diffusion:
  #   image: lscr.io/linuxserver/stable-diffusion-webui:latest
  #   ports:
  #     - "127.0.0.1:7861:7860"
  #   volumes:
  #     - ./clawstack_v2/data/stable_diffusion/config:/config
  #     - ./clawstack_v2/data/stable_diffusion/models:/models
  #   environment:
  #     - PUID=1000
  #     - PGID=1000
  #     - TZ=${TZ}
  #   networks:
  #     - clawstack_default
  #   restart: unless-stopped

  # ============================================================
  # 5. CAE & SIMULATION (From clawstack_v2)
  # ============================================================
  openradioss:
    build: ./clawstack_v2/docker/openradioss
    volumes:
      - ./clawstack_v2/data/work:/work
    working_dir: /work
    command: [ "bash", "-lc", "sleep infinity" ]

  chrono:
    image: uwsbel/projectchrono:latest
    volumes:
      - ./clawstack_v2/data/work:/work
    working_dir: /work
    command: [ "bash", "-lc", "sleep infinity" ]

  openfoam:
    image: opencfd/openfoam-dev:latest
    volumes:
      - ./clawstack_v2/data/work:/work
      - ./data/workspace:/workspace
    working_dir: /workspace
    command: [ "bash", "-lc", "sleep infinity" ]

  # ============================================================
  # 6. QUALITY & ANALYSIS (WorkStudy AI)
  # ============================================================
  workstudy_app:
    build:
      context: ./clawstack_v2/docker/workstudy_app
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:7870:7870"
    volumes:
      - ./clawstack_v2/data/workstudy/projects:/work/projects
    environment:
      - WORKSTUDY_PROJECTS=/work/projects
      - TZ=${TZ}
    restart: unless-stopped

  quality_dashboard:
    build: ./clawstack_v2/docker/quality_dashboard
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      - ./clawstack_v2/data/work:/work
      - ./clawstack_v2/data/paperless/consume:/consume
    restart: unless-stopped

  # ============================================================
  # 7. KNOWLEDGE & DOCS
  # ============================================================
  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    restart: unless-stopped
    depends_on: [ postgres, redis ]
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./clawstack_v2/data/paperless/data:/usr/src/paperless/data
      - ./clawstack_v2/data/paperless/media:/usr/src/paperless/media
      - ./clawstack_v2/data/paperless/export:/usr/src/paperless/export
      - ./clawstack_v2/data/paperless/consume:/usr/src/paperless/consume
    environment:
      PAPERLESS_REDIS: redis://redis:6379
      PAPERLESS_DBHOST: postgres
      PAPERLESS_DBPORT: 5432
      PAPERLESS_DBNAME: postgres
      PAPERLESS_DBUSER: postgres
      PAPERLESS_DBPASS: ${POSTGRES_PASSWORD}
      PAPERLESS_ADMIN_USER: admin
      PAPERLESS_ADMIN_PASSWORD: admin
      PAPERLESS_SECRET_KEY: ${PAPERLESS_SECRET_KEY:-change_me}
      PAPERLESS_URL: http://localhost:8000
      PAPERLESS_CONSUMER_RECURSIVE: "true"
      PAPERLESS_CONSUMER_SUBDIRS_AS_TAGS: "true"
      PAPERLESS_TASK_WORKERS: "1"       # OCRワーカーを1に制限（CPU競合防止）
      PAPERLESS_THREADS_PER_WORKER: "2" # スレッド数を2に制限
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 2g

  open_notebook_db:
    image: surrealdb/surrealdb:v2
    command: start --log info --user root --pass root rocksdb:/mydata/mydatabase.db
    user: root
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - ./clawstack_v2/data/open_notebook/surreal_data:/mydata
    environment:
      - SURREAL_EXPERIMENTAL_GRAPHQL=true
    restart: unless-stopped

  open_notebook:
    image: lfnovo/open_notebook:v1-latest
    ports:
      - "127.0.0.1:8502:8502"
      - "127.0.0.1:5055:5055"
    environment:
      - OPEN_NOTEBOOK_ENCRYPTION_KEY=clawstack_secure_key_2026
      - SURREAL_URL=ws://open_notebook_db:8000/rpc
      - SURREAL_USER=root
      - SURREAL_PASSWORD=root
      - SURREAL_NAMESPACE=open_notebook
      - SURREAL_DATABASE=open_notebook
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./clawstack_v2/data/open_notebook/notebook_data:/app/data
    depends_on:
      - open_notebook_db
      - ollama
    restart: unless-stopped

  portal_server:
    image: nginx:alpine
    ports:
      - "127.0.0.1:8088:80"
    volumes:
      - ./data/workspace:/usr/share/nginx/html:ro
    restart: unless-stopped

  # ============================================================
  # 8. MINIGAME FACTORY
  # ============================================================
  db_minigame:
    image: postgres:16
    environment:
      POSTGRES_USER: ${MINIGAME_DB_USER}
      POSTGRES_PASSWORD: ${MINIGAME_DB_PASSWORD}
      POSTGRES_DB: ${MINIGAME_DB_NAME}
    volumes:
      - minigame_db_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5442:5432"

  redis_minigame:
    image: redis:7
    ports:
      - "127.0.0.1:6389:6379"

  minigame_api:
    build: ./data/workspace/apps/minigame_factory/apps/api
    environment:
      DATABASE_URL: ${MINIGAME_DATABASE_URL}
      REDIS_URL: ${MINIGAME_REDIS_URL}
      PROJECTS_DIR: /workspace/projects
      OUTPUT_DIR: /workspace/output
      SCHEMA_PATH: /workspace/schemas/game_spec.schema.json
    volumes:
      - ./data/workspace/apps/minigame_factory/projects:/workspace/projects
      - ./data/workspace/apps/minigame_factory/output:/workspace/output
      - ./data/workspace/apps/minigame_factory/schemas:/workspace/schemas:ro
    depends_on:
      - db_minigame
      - redis_minigame
    ports:
      - "127.0.0.1:8100:8000"

  minigame_ui:
    build: ./data/workspace/apps/minigame_factory/apps/ui
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8100
    ports:
      - "127.0.0.1:3100:3000"
    depends_on:
      - minigame_api

  # ============================================================
  # 8. VOICE & SIMULATION
  # ============================================================
  voicevox:
    image: voicevox/voicevox_engine:cpu-ubuntu20.04-latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:50021:50021"
    environment:
      - VV_CPU_NUM_THREADS=4

  # ============================================================
  # 9. LLM GATEWAY
  # ============================================================
  litellm:
    image: ghcr.io/berriai/litellm:main
    entrypoint: [ "/bin/sh", "/app/litellm_entrypoint.sh" ]
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./data/state/litellm_config.yaml:/app/proxy_server_config.yaml:ro
      - ./data/state/litellm_entrypoint.sh:/app/litellm_entrypoint.sh:ro
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-local-dev-key}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY}
    depends_on:
      - redis
      - ollama
    restart: unless-stopped

  # ============================================================
  # 10. EMBEDDING / RERANK SERVER
  # ============================================================
  infinity:
    image: michaelf34/infinity:latest
    platform: linux/amd64
    command: [ "v2", "--model-id", "mixedbread-ai/mxbai-embed-large-v1", "--port", "7997",
               "--batch-size", "16" ]
    ports:
      - "127.0.0.1:7997:7997"
    deploy:
      resources:
        limits:
          cpus: "8"    # インジェスト中もOllamaに6コア以上確保
          memory: 4g
    restart: unless-stopped

  # ============================================================
  # 11. WEB SEARCH
  # ============================================================
  searxng:
    image: searxng/searxng:latest
    ports:
      - "127.0.0.1:8086:8080"
    environment:
      - BASE_URL=http://localhost:8086/
    restart: unless-stopped

  # ============================================================
  # 12. UI - Open WebUI
  # ============================================================
  open_webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "127.0.0.1:3002:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - ENABLE_RAG=true
      - WEB_SEARCH_ENGINE=searxng
      - SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>
      # Qdrant をベクトルDBバックエンドに設定（Chroma の代替）
      - VECTOR_DB=qdrant
      - QDRANT_URI=http://qdrant:6333
    depends_on:
      - ollama
      - searxng
      - qdrant
    restart: unless-stopped

  # ============================================================
  # 13. UPTIME KUMA — リアルタイム稼働監視
  # ============================================================
  uptime-kuma:
    image: louislam/uptime-kuma:1
    ports:
      - "127.0.0.1:3010:3001"
    volumes:
      - ./clawstack_v2/data/uptime-kuma:/app/data
    restart: unless-stopped

  # ============================================================
  # 14. CRAWL4AI — AI最適化Webスクレイピング
  # ============================================================
  crawl4ai:
    image: unclecode/crawl4ai:latest
    platform: linux/amd64
    ports:
      - "127.0.0.1:8094:11235"
    environment:
      - OPENAI_API_KEY=local-dev-key
      - OPENAI_BASE_URL=http://litellm:4000/v1
    shm_size: '1gb'
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 2g
    restart: unless-stopped

  # ============================================================
  # 15. PROMETHEUS — メトリクス収集
  # ============================================================
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./data/state/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./clawstack_v2/data/prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    restart: unless-stopped

  # ============================================================
  # 16. GRAFANA — メトリクス可視化ダッシュボード
  # ============================================================
  grafana:
    image: grafana/grafana:latest
    ports:
      - "127.0.0.1:3012:3000"
    volumes:
      - ./clawstack_v2/data/grafana:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=clawstack2026
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3012
    depends_on:
      - prometheus
    restart: unless-stopped

  # ============================================================
  # 17. NOCODB — SQLite/DB UIビューア
  # ============================================================
  nocodb:
    image: nocodb/nocodb:latest
    ports:
      - "127.0.0.1:8093:8080"
    volumes:
      - ./clawstack_v2/data/nocodb:/usr/app/data
    environment:
      - NC_AUTH_JWT_SECRET=clawstack-noco-2026
      - NC_DISABLE_TELE=true
    restart: unless-stopped

  # ============================================================
  # 18. MAILPIT — SMTP + Web UIメールテスト
  # ============================================================
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "127.0.0.1:8025:8025"   # Web UI
      - "127.0.0.1:1025:1025"   # SMTP
    environment:
      - MP_MAX_MESSAGES=500
      - MP_DATABASE=/data/mailpit.db
    volumes:
      - ./clawstack_v2/data/mailpit:/data
    restart: unless-stopped

  # ============================================================
  # 19. EXCALIDRAW — ホワイトボード・計画可視化
  # ============================================================
  excalidraw:
    image: excalidraw/excalidraw:latest
    ports:
      - "127.0.0.1:3013:80"
    restart: unless-stopped

  # ============================================================
  # 20. DOZZLE — Docker ログビューア（リアルタイム）
  # ============================================================
  dozzle:
    image: amir20/dozzle:latest
    ports:
      - "127.0.0.1:8096:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DOZZLE_LEVEL=info
      - DOZZLE_TAILSIZE=300
    restart: unless-stopped

  # ============================================================
  # 21. PORTAINER CE — Docker コンテナ管理UI
  # ============================================================
  portainer:
    image: portainer/portainer-ce:latest
    ports:
      - "127.0.0.1:9002:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./clawstack_v2/data/portainer:/data
    restart: unless-stopped

  # ============================================================
  # 22. METABASE — BIダッシュボード（DB可視化）
  # ============================================================
  metabase:
    image: metabase/metabase:latest
    ports:
      - "127.0.0.1:3014:3000"
    volumes:
      - ./clawstack_v2/data/metabase:/metabase-data
    environment:
      - MB_DB_TYPE=h2
      - MB_DB_FILE=/metabase-data/metabase.db
      - MB_SITE_LOCALE=ja
      - JAVA_TIMEZONE=Asia/Tokyo
    restart: unless-stopped

  # ============================================================
  # 23. LIBRETRANSLATE — オフライン翻訳API（日英）
  # ============================================================
  libretranslate:
    image: libretranslate/libretranslate:latest
    ports:
      - "127.0.0.1:5100:5000"
    volumes:
      - ./clawstack_v2/data/libretranslate:/home/libretranslate/.local/share
    environment:
      - LT_LOAD_ONLY=en,ja
      - LT_DISABLE_WEB_BROWSER_UI=false
      - LT_UPDATE_MODELS=true
    restart: unless-stopped

  # ============================================================
  # 24. IT-TOOLS — 開発者向けユーティリティ集
  # ============================================================
  it-tools:
    image: corentinth/it-tools:latest
    ports:
      - "127.0.0.1:8097:80"
    restart: unless-stopped

  # ============================================================
  # 25. OUTLINE — チームWiki・ナレッジベース
  # ============================================================
  outline:
    image: outlinewiki/outline:latest
    ports:
      - "127.0.0.1:3015:3000"
    volumes:
      - ./clawstack_v2/data/outline:/var/lib/outline/data
    environment:
      - SECRET_KEY=7187e1c1c316940dddc40623e7c650245ad6d6fd4b20ee9dbd0525240822360a
      - UTILS_SECRET=b761642cc171355ad373605f5202739169378f913f3468c055235d72b2600a9f
      - DATABASE_URL=postgres://postgres:change_me@postgres:5432/outline
      - REDIS_URL=redis://redis:6379
      - URL=http://localhost:3015
      - FORCE_HTTPS=false
      - PGSSLMODE=disable
      - FILE_STORAGE=local
      - FILE_STORAGE_LOCAL_ROOT_DIR=/var/lib/outline/data
      - FILE_STORAGE_UPLOAD_MAX_SIZE=26214400
      - SMTP_HOST=mailpit
      - SMTP_PORT=1025
      - SMTP_FROM_EMAIL=outline@clawstack.local
      - SMTP_SECURE=false
      - EMAIL_ENABLED=true
      - DEFAULT_LANGUAGE=ja_JP
    depends_on:
      - postgres
      - redis
      - mailpit
    restart: unless-stopped

  # ============================================================
  # 26. WATCHTOWER — Dockerイメージ更新通知
  # ============================================================
  watchtower:
    image: containrrr/watchtower:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - WATCHTOWER_MONITOR_ONLY=true
      - WATCHTOWER_SCHEDULE=0 0 3 * * *
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_NO_STARTUP_MESSAGE=true
      - DOCKER_API_VERSION=1.44
    restart: unless-stopped

  # ============================================================
  # 27. WHISHPER — 音声→テキスト変換（Whisper UI）
  # ============================================================
  whishper-mongo:
    image: mongo:6
    volumes:
      - ./clawstack_v2/data/whishper/mongo:/data/db
    restart: unless-stopped

  whishper:
    image: pluja/whishper:latest
    ports:
      - "127.0.0.1:8098:8080"
    volumes:
      - ./clawstack_v2/data/whishper/uploads:/app/uploads
      - ./clawstack_v2/data/whishper/models:/app/models
      - ./clawstack_v2/data/whishper/logs:/var/log/whishper
    environment:
      - PUBLIC_INTERNAL_API_HOST=http://whishper:8080
      - PUBLIC_WHISHPER_MODEL=small
      - WHISHPER_MODEL=small
      - PUBLIC_TRANSLATE_SL=auto
      - PUBLIC_TRANSLATE_TL=ja
      - TRANSLATE_URL=http://libretranslate:5000
      - MONGO_URL=mongodb://whishper-mongo:27017/whishper
    depends_on:
      - whishper-mongo
      - libretranslate
    restart: unless-stopped

volumes:
  minigame_db_data:
