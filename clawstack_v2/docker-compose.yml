version: "3.9"
name: clawstack-unified

# ══════════════════════════════════════════════════════════════════════════════
# ⚠️  DEPRECATED (2026-03-15) — このファイルは読み取り専用の参照用として残しています
#
# すべてのサービスはプロジェクトルートの docker-compose.yml に統合されました。
# 通常の起動コマンド: docker compose up -d (ルートから実行)
#
# CAE/Vision/Content プロファイルのサービスはプロファイル指定で起動:
#   docker compose --profile cae up -d       # OpenFOAM/Chrono/Radioss
#   docker compose --profile vision up -d    # CVAT/LabelStudio/FiftyOne
#   docker compose --profile content up -d   # Stable Diffusion/Meilisearch
# ══════════════════════════════════════════════════════════════════════════════

services:
  # -------------------------
  # Core / Orchestration
  # -------------------------
  antigravity:
    build:
      context: ./docker/antigravity
      cache_from:
        - type=local,src=./data/buildcache/antigravity
      cache_to:
        - type=local,dest=./data/buildcache/antigravity,mode=max
    depends_on: [ postgres, redis, qdrant, ollama, minio ]
    environment:
      - POSTGRES_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/postgres
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://ollama:11434
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${MINIO_ROOT_USER}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - WORKDIR=/work
    volumes:
      - ./data/work:/work
      - ./secrets:/secrets:ro
      - ./data/paperless/consume:/home/node/paperless/consume
    ports:
      - "127.0.0.1:5678:5678"
    command: [ "bash", "-lc", "sleep infinity" ]
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ./data/ollama:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7
    volumes:
      - ./data/redis:/data
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - ./data/qdrant:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
    restart: unless-stopped

  # object storage（MinIO：OSSで使える。127.0.0.1に閉じる）
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - ./data/objectstore:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    restart: unless-stopped

  # -------------------------
  # Google Worker (Gmail/Calendar/Drive)
  # -------------------------
  google_worker:
    build: ./docker/google_worker
    volumes:
      - ./data/work:/work
      - ./secrets:/secrets
    environment:
      - GOOGLE_SECRETS_DIR=/secrets
      - WORKDIR=/work
    working_dir: /work
    command: [ "bash", "-lc", "sleep infinity" ]
    profiles: [ "tools" ]

  # -------------------------
  # Diagram / Mindmap
  # -------------------------
  drawio:
    image: jgraph/drawio:latest
    ports:
      - "127.0.0.1:8081:8080"
    restart: unless-stopped
    profiles: [ "tools" ]

  diagram_cli:
    build: ./docker/diagram_cli
    volumes:
      - ./data/work:/work
    working_dir: /work
    command: [ "bash", "-lc", "sleep infinity" ]
    profiles: [ "tools" ]

  n8n:
    image: n8nio/n8n:latest
    user: root
    ports:
      - "127.0.0.1:5679:5678"
    environment:
      - N8N_HOST=127.0.0.1
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://127.0.0.1:5679/
      - GENERIC_TIMEZONE=Asia/Tokyo
      - N8N_BLOCK_SVC_REGISTRATION_DISABLED=false
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=false
      - NODES_EXCLUDE=[]
      - N8N_RESTRICT_FILE_ACCESS_TO=/work
    volumes:
      - ./data/n8n:/root/.n8n
      - ./data/work:/work
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/n8n_bin/docker:/usr/local/bin/docker:ro
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:latest
    ports:
      - "127.0.0.1:1883:1883"
      - "127.0.0.1:9001:9001"
    volumes:
      - ./data/mosquitto/config:/mosquitto/config
      - ./data/mosquitto/data:/mosquitto/data
      - ./data/mosquitto/log:/mosquitto/log
    # Create simple config on startup to allow anonymous access (for local dev)
    entrypoint: [ "sh", "-c", "echo 'listener 1883\\nallow_anonymous true\\nlistener 9001\\nprotocol websockets' > /mosquitto/config/mosquitto.conf && /usr/sbin/mosquitto -c /mosquitto/config/mosquitto.conf" ]
    restart: unless-stopped
    profiles: [ "tools" ]

  nodered:
    image: nodered/node-red:latest
    ports:
      - "127.0.0.1:1880:1880"
    environment:
      - TZ=Asia/Tokyo
    volumes:
      - ./data/nodered:/data
      - ./data/work:/work
    restart: unless-stopped
    profiles: [ "tools" ]

  # -------------------------
  # Vision stack (無料OSS)
  # -------------------------
  cvat:
    image: cvat/server:latest
    ports:
      - "127.0.0.1:8082:8080"
    restart: unless-stopped
    profiles: [ "vision" ]

  label_studio:
    image: heartexlabs/label-studio:latest
    ports:
      - "127.0.0.1:8083:8080"
    volumes:
      - ./data/labelstudio:/label-studio/data
    restart: unless-stopped
    profiles: [ "vision" ]

  fiftyone:
    image: voxel51/fiftyone:latest
    ports:
      - "127.0.0.1:5151:5151"
    volumes:
      - ./data/work:/work
    restart: unless-stopped
    profiles: [ "vision" ]

  vision_worker:
    build: ./docker/vision_worker
    volumes:
      - ./data/work:/work
    working_dir: /work
    ports:
      - "127.0.0.1:7860:7860" # Gradio/Streamlit等のUI
    command: [ "bash", "-lc", "sleep infinity" ]
    profiles: [ "vision" ]

  # -------------------------
  # CAE (profiles=cae)
  # -------------------------
  openradioss:
    build: ./docker/openradioss
    volumes:
      - ./data/work:/work
    working_dir: /work
    command: [ "bash", "-lc", "sleep infinity" ]
    profiles: [ "cae" ]

  voicevox:
    image: voicevox/voicevox_engine:cpu-ubuntu20.04-latest
    ports:
      - "127.0.0.1:50021:50021"
    restart: unless-stopped
    profiles: [ "tools" ]

  chrono:
    image: uwsbel/projectchrono:latest
    volumes:
      - ./data/work:/work
    working_dir: /work
    command: [ "bash", "-lc", "sleep infinity" ]
    profiles: [ "cae" ]

  openfoam:
    image: opencfd/openfoam-dev:latest
    container_name: openfoam
    volumes:
      - ./data/work:/work
      - ../data/workspace:/workspace
    working_dir: /workspace
    command: [ "bash", "-lc", "sleep infinity" ]
    profiles: [ "cae" ]

  # -------------------------
  # DXF to 3D Converter
  # -------------------------
  dxf3d_app:
    build: ./docker/dxf3d_app
    ports:
      - "127.0.0.1:8003:8002"
    volumes:
      - ./data/work:/work
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  # Quality Assurance (profiles=quality/docs)
  # -------------------------
  quality_dashboard:
    build: ./docker/quality_dashboard
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      - ./data/work:/work
      - ./data/paperless/consume:/consume
    restart: unless-stopped
    profiles: [ "quality" ]

  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    restart: unless-stopped
    depends_on: [ postgres, redis ]
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data/paperless/data:/usr/src/paperless/data
      - ./data/paperless/media:/usr/src/paperless/media
      - ./data/paperless/export:/usr/src/paperless/export
      - ./data/paperless/consume:/usr/src/paperless/consume
    environment:
      PAPERLESS_REDIS: redis://redis:6379
      PAPERLESS_DBHOST: postgres
      PAPERLESS_DBPORT: 5432
      PAPERLESS_DBNAME: paperless
      PAPERLESS_DBUSER: postgres
      PAPERLESS_DBPASS: ${POSTGRES_PASSWORD}
      # Initial setup
      PAPERLESS_ADMIN_USER: admin
      PAPERLESS_ADMIN_PASSWORD: admin
      PAPERLESS_SECRET_KEY: ${POSTGRES_PASSWORD} # Reuse for simplicity or generate new
      PAPERLESS_URL: http://127.0.0.1:8000
      PAPERLESS_CONSUMER_RECURSIVE: "true"
      PAPERLESS_CONSUMER_SUBDIRS_AS_TAGS: "true"
    profiles: [ "docs" ]

  # -------------------------
  # Open Notebook (Local NotebookLM clone)
  # -------------------------
  open_notebook_db:
    image: surrealdb/surrealdb:v2
    command: start --log info --user root --pass root rocksdb:/mydata/mydatabase.db
    user: root
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - ./data/open_notebook/surreal_data:/mydata
    environment:
      - SURREAL_EXPERIMENTAL_GRAPHQL=true
    restart: unless-stopped
    profiles: [ "tools" ]

  open_notebook:
    image: lfnovo/open_notebook:v1-latest
    ports:
      - "127.0.0.1:8502:8502" # Web UI
      - "127.0.0.1:5055:5055" # REST API
    environment:
      - OPEN_NOTEBOOK_ENCRYPTION_KEY=clawstack_secure_key_2026
      - SURREAL_URL=ws://open_notebook_db:8000/rpc
      - SURREAL_USER=root
      - SURREAL_PASSWORD=root
      - SURREAL_NAMESPACE=open_notebook
      - SURREAL_DATABASE=open_notebook
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./data/open_notebook/notebook_data:/app/data
    depends_on:
      - open_notebook_db
      - ollama
    restart: unless-stopped
    profiles: [ "tools" ]

  # -------------------------
  # Portal HTTP Server (For NightTab compatibility)
  # -------------------------
  portal_server:
    image: nginx:alpine
    ports:
      - "127.0.0.1:8088:80"
    volumes:
      - ../data/workspace:/usr/share/nginx/html:ro
    restart: unless-stopped
    profiles: [ "tools" ]

  # -------------------------
  # NEW: AI Content Suite (OSS Apps)
  # -------------------------
  stirling_pdf:
    image: stirlingtools/stirling-pdf:latest
    ports:
      - "127.0.0.1:8085:8080"
    environment:
      - DOCKER_ENABLE_SECURITY=false
    volumes:
      - ./data/stirling_pdf/trainingData:/usr/src/app/trainingData
      - ./data/stirling_pdf/extraConfigs:/usr/src/app/configs
    restart: unless-stopped
    profiles: [ "content" ]

  meilisearch:
    image: getmeili/meilisearch:latest
    ports:
      - "127.0.0.1:7700:7700"
    environment:
      - MEILI_MASTER_KEY=clawstack_search_master_2026
      - MEILI_ENV=development
    volumes:
      - ./data/meilisearch:/meili_data
    restart: unless-stopped
    profiles: [ "content" ]

  stable_diffusion:
    image: siutin/stable-diffusion-webui-docker:latest-cpu
    ports:
      - "127.0.0.1:7861:7860"
    restart: unless-stopped
    profiles: [ "content" ]

  # -------------------------
  # AI Efficiency & Caching (NEW)
  # -------------------------
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - ./data/searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8081/
    restart: unless-stopped

  redis-stack:
    image: redis/redis-stack:latest
    container_name: redis-stack
    ports:
      - "127.0.0.1:6380:6379" # Redis port
      - "127.0.0.1:8001:8001" # RedisInsight UI
    volumes:
      - ./data/redis-stack:/data
    restart: unless-stopped
    profiles: [ "tools" ]

  # -------------------------
  # WorkStudy AI (Therbligs + MOST Analysis)
  # -------------------------
  workstudy_app:
    build:
      context: ./docker/workstudy_app
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:7870:7870"
    volumes:
      - ./data/workstudy/projects:/work/projects
    environment:
      - WORKSTUDY_PROJECTS=/work/projects
      - TZ=Asia/Tokyo
      - GRADIO_MAX_FILE_SIZE=2000  # MB — allow up to 2GB uploads
      - OLLAMA_BASE_URL=http://ollama:11434  # local LLM for report comments
    deploy:
      resources:
        limits:
          memory: 6g  # 1GB video + MediaPipe pose data fits in 6GB
    restart: unless-stopped
    profiles: [ "quality" ]

  # -------------------------
  # Dify AI Workflow Platform (NEW for V3)
  # -------------------------
  dify-db:
    image: postgres:15-alpine
    restart: always
    environment:
      PGDATA: /var/lib/postgresql/data
      POSTGRES_DB: dify
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/dify/db:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"

  dify-redis:
    image: redis:6-alpine
    restart: always
    volumes:
      - ./data/dify/redis:/data
    ports:
      - "127.0.0.1:6381:6379"

  dify-api:
    image: langgenius/dify-api:latest
    restart: always
    ports:
      - "127.0.0.1:5001:5001"
    environment:
      DB_USERNAME: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: dify-db
      DB_PORT: 5432
      DB_DATABASE: dify
      REDIS_HOST: dify-redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      SECRET_KEY: clawstack_dify_secret_2026
      DEPLOY_ENV: PRODUCTION
      MIGRATION_ENABLED: "true"
      CONSOLE_API_URL: http://localhost:5001
      CONSOLE_WEB_URL: http://localhost:8092
      SERVICE_API_URL: http://localhost:5001
      APP_MAX_EXECUTION_TIME: 3600
      OLLAMA_API_BASE_URL: http://ollama:11434
      OPENDAL_FS_ROOT: /app/api/storage
      PLUGIN_DAEMON_URL: http://dify-plugin-daemon:5002
      PLUGIN_DAEMON_KEY: clawstack_plugin_key_2026
    volumes:
      - ./data/dify/storage:/app/api/storage
    depends_on:
      - dify-db
      - dify-redis
      - ollama
      - dify-plugin-daemon

  dify-worker:
    image: langgenius/dify-api:latest
    restart: always
    command: /bin/sh -c "/app/api/entrypoint.sh worker"
    environment:
      DB_USERNAME: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: dify-db
      DB_PORT: 5432
      DB_DATABASE: dify
      REDIS_HOST: dify-redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      SECRET_KEY: clawstack_dify_secret_2026
      DEPLOY_ENV: PRODUCTION
      OLLAMA_API_BASE_URL: http://ollama:11434
      OPENDAL_FS_ROOT: /app/api/storage
    volumes:
      - ./data/dify/storage:/app/api/storage
    depends_on:
      - dify-api

  dify-plugin-daemon:
    image: langgenius/dify-plugin-daemon:0.5.3-local
    restart: always
    environment:
      DB_HOST: dify-db
      DB_PORT: 5432
      DB_DATABASE: dify_plugin
      DB_USERNAME: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: dify-redis
      REDIS_PORT: 6379
      REDIS_DB: "0"
      SERVER_PORT: "5002"
      SERVER_KEY: clawstack_plugin_key_2026
      DIFY_INNER_API_URL: http://dify-api:5001
      DIFY_INNER_API_KEY: clawstack_dify_secret_2026
      FORCE_VERIFYING_SIGNATURE: "false"
      ENFORCE_LANGGENIUS_PLUGIN_SIGNATURES: "false"
      MARKETPLACE_ENABLED: "false"
      PLUGIN_REMOTE_INSTALLING_ENABLED: "false"
      PLUGIN_STORAGE_TYPE: local
      PLUGIN_STORAGE_LOCAL_ROOT: /app/storage
      PLUGIN_WORKING_PATH: /app/storage/cwd
      PLUGIN_INSTALLED_PATH: plugin
      PLUGIN_PACKAGE_CACHE_PATH: plugin_packages
      PLUGIN_MEDIA_CACHE_PATH: assets
      PLUGIN_MAX_EXECUTION_TIMEOUT: "600"
      PYTHON_ENV_INIT_TIMEOUT: "120"
      MAX_PLUGIN_PACKAGE_SIZE: "52428800"
      PPROF_ENABLED: "false"
    volumes:
      - ./data/dify/plugins:/app/storage
    depends_on:
      - dify-db
      - dify-redis

  dify-web:
    image: langgenius/dify-web:latest
    restart: always
    ports:
      - "127.0.0.1:8092:3000"
    environment:
      CONSOLE_API_URL: http://localhost:5001
      CONSOLE_WEB_URL: http://localhost:8092
      SERVICE_API_URL: http://localhost:5001
      APP_API_URL: http://localhost:8092
    depends_on:
      - dify-api

  # -------------------------
  # llama.cpp Server (GGUF直接推論, OpenAI互換API)
  # 使い方: ./data/llama_cpp/models/ に .gguf ファイルを置き
  #         docker compose --profile llm up -d llama_cpp
  # -------------------------
  llama_cpp:
    image: ghcr.io/ggerganov/llama.cpp:server
    container_name: llama_cpp
    ports:
      - "127.0.0.1:8086:8086"
    volumes:
      - ./data/llama_cpp/models:/models:ro
    environment:
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_PORT=8086
      - LLAMA_ARG_MODEL=/models/model.gguf
      - LLAMA_ARG_CTX_SIZE=8192
      - LLAMA_ARG_N_PARALLEL=4
      - LLAMA_ARG_FLASH_ATTN=1
    restart: unless-stopped
    profiles: ["llm"]

  # -------------------------
  # Docling Document Parser (PDF/DOCX/PPTX → Markdown/JSON)
  # API: http://localhost:8087/v1alpha/convert/source
  # -------------------------
  docling:
    image: quay.io/docling-project/docling-serve:latest
    container_name: docling
    ports:
      - "127.0.0.1:8087:5001"
    volumes:
      - ./data/docling/scratch:/tmp/docling
    environment:
      - DOCLING_SERVE_NUM_WORKERS=1   # インジェスト時のCPU競合防止（2→1）
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 6g
    restart: unless-stopped

  # -------------------------
  # Langfuse (LLM可観測性・トレーシング)
  # UI: http://localhost:3001
  # 初期ログイン: y.suzuki.hk@gmail.com / clawstack2026
  # v3はClickHouseが必須
  # -------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: clickhouse
    user: root
    ports:
      - "127.0.0.1:8123:8123"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      - CLICKHOUSE_DB=langfuse
      - CLICKHOUSE_USER=langfuse
      - CLICKHOUSE_PASSWORD=langfuse
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2g
    restart: unless-stopped

  langfuse-db-init:
    image: postgres:16
    command: >
      sh -c "until pg_isready -h postgres -U postgres; do sleep 1; done;
             psql -h postgres -U postgres -c 'CREATE DATABASE langfuse;' || true"
    environment:
      - PGPASSWORD=${POSTGRES_PASSWORD}
    depends_on:
      - postgres
    restart: "no"

  langfuse:
    image: langfuse/langfuse:3.37.0
    container_name: langfuse
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      langfuse-db-init:
        condition: service_completed_successfully
      clickhouse:
        condition: service_started
      redis:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/langfuse
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_MIGRATION_URL=clickhouse://langfuse:langfuse@clickhouse:9000/langfuse
      - CLICKHOUSE_USER=langfuse
      - CLICKHOUSE_PASSWORD=langfuse
      - CLICKHOUSE_CLUSTER_ENABLED=false
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NEXTAUTH_SECRET=clawstack_langfuse_auth_2026
      - NEXTAUTH_URL=http://localhost:3001
      - ENCRYPTION_KEY=3f8a2b4c9e1d7f6a5c8b2e3d9f1a7c4b6e8d2f5a3c9b7e1d4f8a6c2b9e7d5f3a
      - SALT=clawstack_langfuse_salt_2026
      - TELEMETRY_ENABLED=false
      - NEXT_PUBLIC_LANGFUSE_RUN_NEXT_INIT=false
      - LANGFUSE_RUN_BACKGROUND_WORKER=true
      - REDIS_AUTH=
      - LANGFUSE_DEFAULT_TTL_DAYS=90
      - LANGFUSE_S3_EVENT_UPLOAD_BUCKET=langfuse-events
      - LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT=http://minio:9000
      - LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - LANGFUSE_S3_EVENT_UPLOAD_REGION=us-east-1
      - LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE=true
      - LANGFUSE_S3_MEDIA_UPLOAD_BUCKET=langfuse-events
      - LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT=http://minio:9000
      - LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
