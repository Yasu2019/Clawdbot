services:
  learning_engine:
    build:
      context: ./docker/learning_engine
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8110:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - EMBEDDING_BASE_URL=http://host.docker.internal:7997
      - EMBEDDING_MODEL=bge-small-en-v1.5
      - EMBEDDING_SIZE=256
      - MEMORY_TOP_K=8
      - INCLUDE_CROSS_ORG_DEFAULT=false
    volumes:
      - ../data/workspace:/workspace
      - ./data/work:/work
      - ./data/learning_engine:/app/data
    depends_on:
      - qdrant
    restart: unless-stopped
